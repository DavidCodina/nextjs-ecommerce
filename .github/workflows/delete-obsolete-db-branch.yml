name: Log Branch Deletion

#  When you run git push origin --delete feature-a, you're deleting the branch on the remote repository.
# However, GitHub Actions workflows are triggered by events that happen through the GitHub interface or API.
#A command-line delete might not trigger the event in the same way.
on:
  delete:
    # This workflow will only run when a branch is deleted
    # No need to specify 'branches' here as the delete event is only triggered for branches

jobs:
  log-deletion:
    runs-on: ubuntu-latest
    if: github.event.ref_type == 'branch'

    steps:
      - name: Log branch deletion
        env:
          BRANCH_REF: ${{ github.event.ref }}
        run: echo "Branch deleted - $BRANCH_REF"
